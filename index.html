
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super High Tech CNC Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        "primary": "#1791cf",
                        "background-light": "#f6f7f8",
                        "background-dark": "#1A1A1A",
                        "panel-dark": "#2B2B2B",
                        "border-dark": "#404040",
                        "highlight": "#3D3D3D",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1A1A; 
        }
        ::-webkit-scrollbar-thumb {
            background: #404040; 
            border-radius: 0px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #505050; 
        }
        
        /* Machined Chamfer Effects */
        .chamfer-sm {
            clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
        }
        
        .chamfer-md {
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .chamfer-lg {
            clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
        }

        /* Top-Left / Bottom-Right Machined Cut */
        .chamfer-accent {
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .hex-bg {
            background-color: #111;
            background-image: 
                linear-gradient(30deg, #1A1A1A 12%, transparent 12.5%, transparent 87%, #1A1A1A 87.5%, #1A1A1A),
                linear-gradient(150deg, #1A1A1A 12%, transparent 12.5%, transparent 87%, #1A1A1A 87.5%, #1A1A1A),
                linear-gradient(30deg, #1A1A1A 12%, transparent 12.5%, transparent 87%, #1A1A1A 87.5%, #1A1A1A),
                linear-gradient(150deg, #1A1A1A 12%, transparent 12.5%, transparent 87%, #1A1A1A 87.5%, #1A1A1A),
                linear-gradient(60deg, #222 25%, transparent 25.5%, transparent 75%, #222 75%, #222),
                linear-gradient(60deg, #222 25%, transparent 25.5%, transparent 75%, #222 75%, #222);
            background-size: 20px 35px;
            background-position: 0 0, 0 0, 10px 18px, 10px 18px, 0 0, 10px 18px;
        }

        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
        }

        /* Enforce sharp corners globally */
        * {
            border-radius: 0 !important;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-[#1A1A1A] text-white font-display h-screen overflow-hidden">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
